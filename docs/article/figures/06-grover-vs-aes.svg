<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="500" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="44" font-size="25" font-weight="700" fill="#0f172a">Why Grover Doesn't Break AES</text>
  <text x="40" y="68" font-size="14" fill="#475569">Grover only halves the security exponent (2^k → 2^(k/2)). Double the key and you are back to safe.</text>

  <!-- Legend -->
  <rect x="560" y="86" width="14" height="14" fill="#2563eb"/>
  <text x="580" y="98" font-size="13" fill="#334155">classical brute force (2^k)</text>
  <rect x="560" y="106" width="14" height="14" fill="#d97706"/>
  <text x="580" y="118" font-size="13" fill="#334155">Grover effective (2^(k/2))</text>

  <!-- Y gridlines + ticks (bits) -->
  <g stroke="#eef2f7" stroke-width="1">
    <line x1="90" y1="430" x2="860" y2="430"/>
    <line x1="90" y1="345" x2="860" y2="345"/>
    <line x1="90" y1="260" x2="860" y2="260"/>
    <line x1="90" y1="175" x2="860" y2="175"/>
    <line x1="90" y1="90" x2="860" y2="90"/>
  </g>
  <g font-size="12" fill="#64748b" text-anchor="end">
    <text x="82" y="434">0</text>
    <text x="82" y="349">64</text>
    <text x="82" y="264">128</text>
    <text x="82" y="179">192</text>
    <text x="82" y="94">256</text>
  </g>
  <text x="30" y="260" font-size="13" fill="#475569" text-anchor="middle" transform="rotate(-90 30 260)" font-weight="600">security (bits)</text>

  <!-- Axes -->
  <line x1="90" y1="90" x2="90" y2="430" stroke="#0f172a" stroke-width="1.5"/>
  <line x1="90" y1="430" x2="860" y2="430" stroke="#0f172a" stroke-width="1.5"/>

  <!-- "safe" threshold at 128 bits -->
  <line x1="90" y1="260" x2="860" y2="260" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="854" y="252" font-size="12" fill="#15803d" text-anchor="end" font-weight="600">128-bit — comfortably out of reach</text>

  <!-- AES-128 group -->
  <rect x="180" y="260" width="50" height="170" fill="#2563eb"/>
  <text x="205" y="252" font-size="12" fill="#1d4ed8" text-anchor="middle" font-weight="700">2¹²⁸</text>
  <rect x="240" y="345" width="50" height="85" fill="#d97706"/>
  <text x="265" y="337" font-size="12" fill="#b45309" text-anchor="middle" font-weight="700">2⁶⁴</text>
  <text x="235" y="450" font-size="13" fill="#334155" text-anchor="middle" font-weight="600">AES-128</text>

  <!-- AES-192 group -->
  <rect x="425" y="175" width="50" height="255" fill="#2563eb"/>
  <text x="450" y="167" font-size="12" fill="#1d4ed8" text-anchor="middle" font-weight="700">2¹⁹²</text>
  <rect x="485" y="302" width="50" height="128" fill="#d97706"/>
  <text x="510" y="294" font-size="12" fill="#b45309" text-anchor="middle" font-weight="700">2⁹⁶</text>
  <text x="480" y="450" font-size="13" fill="#334155" text-anchor="middle" font-weight="600">AES-192</text>

  <!-- AES-256 group -->
  <rect x="670" y="90" width="50" height="340" fill="#2563eb"/>
  <text x="695" y="82" font-size="12" fill="#1d4ed8" text-anchor="middle" font-weight="700">2²⁵⁶</text>
  <rect x="730" y="260" width="50" height="170" fill="#d97706"/>
  <text x="755" y="252" font-size="12" fill="#b45309" text-anchor="middle" font-weight="700">2¹²⁸</text>
  <text x="725" y="450" font-size="13" fill="#334155" text-anchor="middle" font-weight="600">AES-256</text>

  <!-- Caption -->
  <text x="40" y="484" font-size="11.5" fill="#94a3b8">Even the idealised Grover exponents are worst-case query bounds; the iterations are inherently sequential (non-parallelisable), so real attacks cost far more. Contrast RSA, where Shor is exponential and bigger keys don't save you.</text>
</svg>
