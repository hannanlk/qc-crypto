<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="upArrow" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,10 L5,0 L10,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="560" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="44" font-size="25" font-weight="700" fill="#0f172a">Why RSA Is Safe Today — and What Shor Would Change</text>
  <text x="40" y="68" font-size="14" fill="#475569">Estimated operations to factor an n-bit modulus. Lower is easier to break.</text>

  <!-- Legend -->
  <line x1="560" y1="96" x2="592" y2="96" stroke="#dc2626" stroke-width="3"/>
  <text x="600" y="100" font-size="13" fill="#334155">Trial division (naive)</text>
  <line x1="560" y1="116" x2="592" y2="116" stroke="#d97706" stroke-width="3"/>
  <text x="600" y="120" font-size="13" fill="#334155">GNFS (best classical)</text>
  <line x1="560" y1="136" x2="592" y2="136" stroke="#2563eb" stroke-width="3"/>
  <text x="600" y="140" font-size="13" fill="#334155">Shor (quantum, fault-tolerant)</text>

  <!-- Gridlines + Y ticks (10^0 .. 10^60) -->
  <g stroke="#eef2f7" stroke-width="1">
    <line x1="110" y1="440" x2="850" y2="440"/>
    <line x1="110" y1="381.7" x2="850" y2="381.7"/>
    <line x1="110" y1="323.3" x2="850" y2="323.3"/>
    <line x1="110" y1="265" x2="850" y2="265"/>
    <line x1="110" y1="206.7" x2="850" y2="206.7"/>
    <line x1="110" y1="148.3" x2="850" y2="148.3"/>
    <line x1="110" y1="90" x2="850" y2="90"/>
  </g>
  <g font-size="12" fill="#64748b" text-anchor="end">
    <text x="100" y="444">10⁰</text>
    <text x="100" y="385.7">10¹⁰</text>
    <text x="100" y="327.3">10²⁰</text>
    <text x="100" y="269">10³⁰</text>
    <text x="100" y="210.7">10⁴⁰</text>
    <text x="100" y="152.3">10⁵⁰</text>
    <text x="100" y="94">10⁶⁰</text>
  </g>

  <!-- Axes -->
  <line x1="110" y1="90" x2="110" y2="440" stroke="#0f172a" stroke-width="1.5"/>
  <line x1="110" y1="440" x2="850" y2="440" stroke="#0f172a" stroke-width="1.5"/>

  <!-- X ticks -->
  <g font-size="12" fill="#64748b" text-anchor="middle">
    <text x="110" y="460">64</text>
    <text x="258" y="460">128</text>
    <text x="406" y="460">256</text>
    <text x="554" y="460">512</text>
    <text x="702" y="460">1024</text>
    <text x="850" y="460">2048</text>
  </g>
  <text x="480" y="488" font-size="13" fill="#475569" text-anchor="middle" font-weight="600">modulus size (bits)</text>

  <!-- RSA-2048 guide -->
  <line x1="850" y1="90" x2="850" y2="440" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Trial division (red) — exits the top of the chart -->
  <polyline points="110,384.0 258,327.42 406,215.42 488.6,92" fill="none" stroke="#dc2626" stroke-width="3" marker-end="url(#upArrow)"/>
  <text x="500" y="112" font-size="12" fill="#dc2626">off the chart: ≈10³⁰⁸ at 2048-bit</text>

  <!-- GNFS (amber) -->
  <polyline points="110,398.0 258,381.08 406,357.75 554,327.42 702,287.75 850,234.67" fill="none" stroke="#d97706" stroke-width="3"/>
  <circle cx="850" cy="234.67" r="4" fill="#d97706"/>

  <!-- Shor (blue) -->
  <polyline points="110,408.5 258,403.25 406,398.0 554,392.75 702,387.5 850,382.25" fill="none" stroke="#2563eb" stroke-width="3"/>
  <circle cx="850" cy="382.25" r="4" fill="#2563eb"/>

  <!-- Annotations at RSA-2048 -->
  <text x="842" y="228" font-size="12.5" font-weight="700" fill="#b45309" text-anchor="end">≈10³⁵ ops — best classical</text>
  <text x="842" y="375" font-size="12.5" font-weight="700" fill="#1d4ed8" text-anchor="end">≈10¹⁰ ops — Shor</text>

  <!-- The gap callout -->
  <text x="864" y="308" font-size="12" fill="#64748b" transform="rotate(90 864 308)" text-anchor="middle">the security gap</text>

  <!-- Caption -->
  <text x="40" y="520" font-size="11.5" fill="#94a3b8">Heuristic scalings: trial division ~2^(b/2); GNFS ~ L_n[1/3, 1.923] (best known classical); Shor ~ b³ gate-count (illustrative). The shape is the point:</text>
  <text x="40" y="537" font-size="11.5" fill="#94a3b8">classical cost explodes super-polynomially with key size, while Shor's stays polynomial. Regenerate with scripts/make_wall_chart.py.</text>
</svg>
