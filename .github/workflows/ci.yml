name: CI

# Phase 0 CI is intentionally classical and simulator-free: it must run fast and
# deterministically on every push. Quantum/hardware runs are never executed in CI
# (they are non-deterministic, slow, and cost real IBM Quantum time).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (dev extras only — no quantum stack in CI)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy

      - name: Test (pytest)
        run: pytest --cov=qcrypto --cov-report=term-missing
